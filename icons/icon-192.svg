<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <rect width="192" height="192" rx="36" fill="#1a1a1a"/>
  <!-- Clock face -->
  <circle cx="96" cy="104" r="58" fill="none" stroke="#c8f060" stroke-width="8"/>
  <!-- Hour ticks -->
  <line x1="96" y1="52" x2="96" y2="64" stroke="#c8f060" stroke-width="5" stroke-linecap="round"/>
  <line x1="96" y1="144" x2="96" y2="156" stroke="#c8f060" stroke-width="5" stroke-linecap="round"/>
  <line x1="144" y1="104" x2="156" y2="104" stroke="#c8f060" stroke-width="5" stroke-linecap="round"/>
  <line x1="36" y1="104" x2="48" y2="104" stroke="#c8f060" stroke-width="5" stroke-linecap="round"/>
  <!-- Hour hand -->
  <line x1="96" y1="104" x2="96" y2="72" stroke="#c8f060" stroke-width="6" stroke-linecap="round"/>
  <!-- Minute hand -->
  <line x1="96" y1="104" x2="122" y2="104" stroke="#c8f060" stroke-width="4" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="96" cy="104" r="5" fill="#c8f060"/>
  <!-- Crown/button on top -->
  <rect x="82" y="38" width="28" height="10" rx="5" fill="#c8f060"/>
</svg>
