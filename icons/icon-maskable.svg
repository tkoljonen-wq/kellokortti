<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Maskable: full bleed background, content within safe zone (inner 80%) -->
  <rect width="512" height="512" fill="#1a1a1a"/>
  <!-- Clock face — centered, scaled to fit safe zone -->
  <circle cx="256" cy="276" r="130" fill="none" stroke="#c8f060" stroke-width="18"/>
  <!-- Hour ticks -->
  <line x1="256" y1="154" x2="256" y2="184" stroke="#c8f060" stroke-width="12" stroke-linecap="round"/>
  <line x1="256" y1="368" x2="256" y2="398" stroke="#c8f060" stroke-width="12" stroke-linecap="round"/>
  <line x1="386" y1="276" x2="356" y2="276" stroke="#c8f060" stroke-width="12" stroke-linecap="round"/>
  <line x1="126" y1="276" x2="156" y2="276" stroke="#c8f060" stroke-width="12" stroke-linecap="round"/>
  <!-- Hour hand -->
  <line x1="256" y1="276" x2="256" y2="206" stroke="#c8f060" stroke-width="14" stroke-linecap="round"/>
  <!-- Minute hand -->
  <line x1="256" y1="276" x2="316" y2="276" stroke="#c8f060" stroke-width="10" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="256" cy="276" r="12" fill="#c8f060"/>
  <!-- Crown/button on top -->
  <rect x="226" y="122" width="60" height="24" rx="12" fill="#c8f060"/>
</svg>
